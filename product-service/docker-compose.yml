services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shop_products
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shop_products"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build: .
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/shop_products
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 3001